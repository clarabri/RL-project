_target_: src.algorithms.ppo.PPOAlgorithm

# Pixel observations (Atari)
obs_key: pixels

# Networks
actor_network:
  _partial_: true
  _target_: src.networks.make_atari_ppo_actor

critic_network:
  _partial_: true
  _target_: src.networks.make_atari_ppo_critic

# --------------------------------------------------
# Optimisation
# --------------------------------------------------

lr: 2.5e-4
weight_decay: 0.0
eps: 1.0e-6
max_grad_norm: 0.5

# --------------------------------------------------
# PPO loss
# --------------------------------------------------

gamma: 0.99

gae_lambda: 0.95

clip_epsilon: 0.1
critic_coeff: 1.0
entropy_coeff: 0.01

ppo_epochs: 3
mini_batch_size: 256

anneal_lr: true
anneal_clip_epsilon: true

loss_critic_type: l2

# --------------------------------------------------
# Collection
# --------------------------------------------------

frames_per_batch: 1024
max_frames_per_traj: -1